name = "hex-matrix-mathlib"
defaultTargets = ["HexMatrixMathlib"]

# Keep the HexMatrix pin in sync with the hex-matrix repo: bump both together.
[[require]]
name = "HexBasic"
git = "https://github.com/kim-em/hex-basic.git"
rev = "f1580d28c2e9ff9e8d4d7cdef9dccbaa17780b03"

[[require]]
name = "HexMatrix"
git = "https://github.com/kim-em/hex-matrix.git"
rev = "7359d9c53c3d85309b526dd1663a33b28a28bf50"

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.32.0-rc1-patch1"

[[lean_lib]]
name = "HexMatrixMathlib"
